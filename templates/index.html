<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bark Config Editor</title>
    <style>
        /* 样式完全保留原样 */
        body { margin: 0; padding: 0; background-color: #121212; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px 20px; background-color: #1e1e1e; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 0; font-size: 18px; color: #fff; }
        button { background-color: #007acc; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        button:hover { background-color: #0098ff; }
        .container { display: flex; flex-direction: column; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        .section { flex: 1; background-color: #1e1e1e; border-radius: 10px; padding: 15px; display: flex; flex-direction: column; border: 1px solid #333; overflow: hidden; }
        .section-header { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #aaa; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex: 1; background-color: #2d2d2d; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; font-size: 14px; outline: none; }
        input[type="text"]:focus { border-color: #007acc; }
        .tags-container { flex: 1; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 10px; overflow-y: auto; }
        .tag { background-color: #333; border: 1px solid #555; padding: 6px 14px; border-radius: 999px; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; word-break: break-all; }
        .tag .close-btn { color: #ff6b6b; cursor: pointer; font-weight: bold; font-family: monospace; font-size: 14px; }
        .tag .close-btn:hover { color: #ff4757; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        /* 状态提示字样式 */
        #status-msg { margin-right: 15px; color: #4caf50; font-size: 14px; opacity: 0; transition: opacity 0.3s; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Bark 规则编辑器</h1>
        <div>
            <span id="status-msg">保存成功！</span>
            <button id="saveBtn" onclick="saveConfig()">💾 保存修改</button>
        </div>
    </div>

    <div class="container">
        <div class="section">
            <div class="section-header">关键词 (Keywords)</div>
            <div class="input-group">
                <input type="text" id="keywords-input" placeholder="输入关键词，按回车添加..." onkeypress="handleEnter(event, 'keywords')">
                <button onclick="addTag('keywords')">添加</button>
            </div>
            <div class="tags-container" id="keywords-tags"></div>
        </div>

        <div class="section">
            <div class="section-header">白名单 (Whitelist)</div>
            <div class="input-group">
                <input type="text" id="whitelist-input" placeholder="输入白名单，按回车添加..." onkeypress="handleEnter(event, 'whitelist')">
                <button onclick="addTag('whitelist')">添加</button>
            </div>
            <div class="tags-container" id="whitelist-tags"></div>
        </div>

        <div class="section">
            <div class="section-header">黑名单 (Blacklist)</div>
            <div class="input-group">
                <input type="text" id="blacklist-input" placeholder="输入黑名单，按回车添加..." onkeypress="handleEnter(event, 'blacklist')">
                <button onclick="addTag('blacklist')">添加</button>
            </div>
            <div class="tags-container" id="blacklist-tags"></div>
        </div>
    </div>

    <script>
        let configData = { keywords: [], whitelist: [], blacklist: [] };

        // 页面加载时，自动向后端请求配置
        window.onload = function() {
            fetch('/api/config')
                .then(response => response.json())
                .then(data => {
                    configData = {
                        keywords: data.keywords || [],
                        whitelist: data.whitelist || [],
                        blacklist: data.blacklist || []
                    };
                    renderAll();
                })
                .catch(err => console.error("加载配置失败", err));
        };

        function handleEnter(event, type) {
            if (event.key === 'Enter') addTag(type);
        }

        function addTag(type) {
            const inputEl = document.getElementById(`${type}-input`);
            const value = inputEl.value.trim();
            if (value && !configData[type].includes(value)) {
                configData[type].push(value);
                inputEl.value = '';
                renderTags(type);
            }
        }

        function removeTag(type, index) {
            configData[type].splice(index, 1);
            renderTags(type);
        }

        function renderTags(type) {
            const container = document.getElementById(`${type}-tags`);
            container.innerHTML = '';
            configData[type].forEach((tag, index) => {
                const tagEl = document.createElement('div');
                tagEl.className = 'tag';
                tagEl.innerHTML = `<span>${tag}</span><span class="close-btn" onclick="removeTag('${type}', ${index})">✕</span>`;
                container.appendChild(tagEl);
            });
        }

        function renderAll() {
            renderTags('keywords');
            renderTags('whitelist');
            renderTags('blacklist');
        }

        // 覆盖保存到后端
        function saveConfig() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = '保存中...';

            fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(configData)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    showSuccess();
                }
            })
            .catch(err => alert("保存失败，请检查终端报错"))
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '💾 保存修改';
            });
        }

        // 显示右上角的成功提示
        function showSuccess() {
            const msg = document.getElementById('status-msg');
            msg.style.opacity = '1';
            setTimeout(() => { msg.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
